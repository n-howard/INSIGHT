name: Ping Supabase to Prevent Pausing

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Supabase Client
        run: npm install @supabase/supabase-js

      - name: Ping Supabase Databases
        env:
          SUPABASE_CONFIGS: ${{ secrets.SUPABASE_CONFIGS }}
        run: |
          node -e "
          (async () => {
            try {
              const { createClient } = require('@supabase/supabase-js');
              const configs = JSON.parse(process.env.SUPABASE_CONFIGS);

              for (const config of configs) {
                console.log('Pinging ' + (config.name || 'Project') + '...');
                const supabase = createClient(config.url, config.key);

                const { data, error } = await supabase
                  .from('users')
                  .select('id')
                  .limit(1);

                if (error) {
                  console.log('  Database contacted. Status: ' + error.message);
                } else {
                  console.log('  Success: Activity logged for ' + config.url);
                }
              }
            } catch (err) {
              console.error('Fatal error:', err.message);
              process.exit(1);
            }
          })();
          "

